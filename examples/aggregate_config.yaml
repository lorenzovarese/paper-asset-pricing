sources:
  - name: crsp_returns
    connector: local
    path: data/test/ret.csv
    join_on: ["permno", "date"]
    level: firm

  - name: firm_chars
    connector: local
    path: data/test/firm.csv
    join_on: ["permno", "date"]
    level: firm

  - name: macro
    connector: local
    path: data/test/macro.csv
    join_on: ["date"]
    level: macro

transformations:
  - type: one_hot
    column: sic2
    prefix: sic2_
    drop_original: true

  - type: fillna_grouped
    method: median
    group_by_column: date
    # By omitting 'columns', all numeric columns will be targeted.
    # If you want to be explicit, list them:
    # columns: ["ret", "dp", "ep", "bm", "ntis", "tbl", "tms", "dfy", "svar"]
    columns: ["ret"]

  # Example of lagging a column
  # - type: lag
  #   columns: ["tbl"]
  #   periods: 1

output:
  format: parquet
  # parquet_engine: "pyarrow" # Optional, default is "auto"
  # parquet_compression: "gzip" # Optional, default is "snappy"