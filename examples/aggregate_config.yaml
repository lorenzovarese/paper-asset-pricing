sources:
  - name: crsp_returns
    connector: local
    path: data/crsp_returns_2002_2021.csv
    join_on: ["permno", "date"]
    level: firm
    date_handling:
      frequency: monthly

  - name: firm_chars
    connector: local
    path: data/firm_chars_2002_2021.csv
    join_on: ["permno", "date"]
    level: firm
    is_primary_firm_base: true
    date_handling:
      frequency: monthly

  - name: macro
    connector: local
    path: data/wg_macro_2002_2021.csv
    join_on: ["date"]
    level: macro
    date_handling:
      frequency: monthly

# Transformations will run BEFORE imputation
transformations:
  - type: clean_numeric # Add this step early for columns like 'ret'
    columns: ["ret"]
    action: "to_nan" # This will convert 'B', 'C', etc. in 'ret' to NaN

  - type: one_hot
    column: sic2
    prefix: sic2_
    drop_original: true

  - type: grouped_fill_missing # This replaces both old fillna_grouped and imputation
    method: median 
    group_by_column: date 
    # columns: ["ret"] # Explicitly target 'ret' or omit 'columns' to target all numerics
    missing_threshold_warning: 0.7 
    missing_threshold_error: 0.8   

  # Example of lagging a column
  # - type: lag
  #   columns: ["tbl"]
  #   periods: 1

output:
  format: parquet
