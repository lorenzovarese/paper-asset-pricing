sources:
  - name: crsp_returns
    connector: local
    path: data/test/ret.csv # Path to CRSP returns data
    join_on: ["permno", "date"]          # Columns to join on
    level: firm                          # Data level: firm-specific
    date_handling:                       # Configuration for date processing
      frequency: monthly                 # Assume data is monthly, align to month-end

  - name: firm_chars
    connector: local
    path: data/test/firm.csv  # Path to firm characteristics data
    join_on: ["permno", "date"]          # Columns to join on
    level: firm                          # Data level: firm-specific
    is_primary_firm_base: true           # This is the main firm-level table to merge onto
    date_handling:                       # Configuration for date processing
      frequency: monthly                 # Assume data is monthly, align to month-end

  - name: macro
    connector: local
    path: data/test/macro.csv    # Path to macroeconomic data
    join_on: ["date"]                    # Column to join on
    level: macro                         # Data level: macroeconomic
    date_handling:                       # Configuration for date processing
      frequency: monthly                 # Assume data is monthly, align to month-end

transformations:
  - type: clean_numeric                 # Transformation to convert columns to numeric type
    columns: ["ret"]                    # Target the 'ret' (return) column
    action: "to_nan"                    # Convert any non-numeric values (like 'B', 'C') in 'ret' to NaN

  - type: one_hot                       # One-hot encode a categorical column
    column: sic2                        # Target the 'sic2' (industry code) column
    prefix: sic2_                       # Prefix for the new one-hot encoded columns
    drop_original: true                 # Remove the original 'sic2' column after encoding

  - type: grouped_fill_missing          # Fill missing values within groups
    method: median                      # Use the median of each group to fill NaNs
    group_by_column: date               # Group data by the 'date' column
    # columns: ["ret", "char1"]         # Optional: List of specific columns to fill. 
                                        # If omitted (like now), all numeric columns (except group_by_column) will be targeted.
    missing_threshold_warning: 0.7      # Issue a warning if a group has >70% missing values for a column
    missing_threshold_error: 0.8        # Raise an error if a group has >80% missing values for a column

  - type: expand_cartesian              # Create interaction terms
    macro_columns: ["dp", "ep"]         # List of 'macro' conceptual columns for interaction
                                        # (These columns must exist in the DataFrame at this stage)
    firm_columns: ["char1", "ret"]      # List of 'firm' conceptual columns for interaction
                                        # New columns will be named e.g., "dp_x_char1", "dp_x_ret", "ep_x_char1", "ep_x_ret"
  
  # Example of lagging a column (currently commented out)
  # - type: lag
  #   columns: ["tbl", "dp_x_char1"]    # Columns to lag (can include newly created interaction terms)
  #   periods: 1                        # Number of periods to lag by

output:
  format: parquet                       # Desired output format for the final aggregated table
  # parquet_engine: "pyarrow"           # Optional: Specify Parquet engine (e.g., "pyarrow", "fastparquet")
  # parquet_compression: "snappy"       # Optional: Specify Parquet compression