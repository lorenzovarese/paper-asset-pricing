sources:
  - name: crsp_returns
    connector: local
    path: data/crsp_returns_2002_2021.csv
    join_on: ["permno", "date"]
    level: firm
    date_handling:
      frequency: monthly

  - name: firm_chars
    connector: local
    path: data/firm_chars_2002_2021.csv
    join_on: ["permno", "date"]
    level: firm
    is_primary_firm_base: true
    date_handling:
      frequency: monthly

  - name: macro
    connector: local
    path: data/wg_macro_2002_2021.csv
    join_on: ["date"]
    level: macro
    date_handling:
      frequency: monthly

# Transformations will run BEFORE imputation
transformations:
  - type: clean_numeric # Add this step early for columns like 'ret'
    columns: ["ret"]
    action: "to_nan" # This will convert 'B', 'C', etc. in 'ret' to NaN

  - type: one_hot
    column: sic2
    prefix: sic2_
    drop_original: true

  - type: fillna_grouped
    method: median 
    group_by_column: date 
    columns: ["ret"] 

  # Example of lagging a column
  # - type: lag
  #   columns: ["tbl"]
  #   periods: 1

imputation: 
  method: median 
  group_by_column: "date" 
  # target_columns: ["ret", "some_other_char"]
  missing_threshold_warning: 0.6 
  missing_threshold_error: 0.8   

output:
  format: parquet
  # parquet_engine: "pyarrow"
  # parquet_compression: "snappy"

