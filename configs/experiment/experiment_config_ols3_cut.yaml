# Similar to Fama and French 3 factor model

dataset:
  path: "data/out_cut.parquet"
  date_column: "date"
  id_column: "permno"

model:
  name: "ols"
  target: "ret_firm"
  # optional: list of features to use
  include_features:
  - "bm_firm"
  - "mvel1_firm"
  - "mom12m_firm"
  params: {}
  output_path: "models/ols.joblib"

evaluation:
  train_years: 2
  val_years: 1
  test_years: 1
  roll_years: 1
